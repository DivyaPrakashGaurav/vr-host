<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Viewer</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    body { margin:0; }
    #loading {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      color:white;
      font-size:18px;
      z-index:999;
    }
  </style>
</head>

<body>

<div id="loading">Loading VR...</div>

<a-scene background="color: #111">

  <!-- Camera -->
  <a-entity camera position="0 1.6 0" look-controls></a-entity>

  <!-- Light -->
  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" intensity="1" position="1 1 1"></a-light>

  <!-- Model -->
  <a-entity id="model"
            position="0 1 -3"
            scale="1 1 1"
            rotation="0 180 0">
  </a-entity>

</a-scene>

<script>

async function initVR() {

  const loading = document.getElementById("loading");

  try {
    // 🔥 URL decode (IMPORTANT)
    const params = new URLSearchParams(window.location.search);
    const jsonUrl = decodeURIComponent(params.get("data") || "");

    if (!jsonUrl) {
      loading.innerText = "No JSON URL!";
      return;
    }

    loading.innerText = "Fetching JSON...";

    // 🔥 Fetch JSON
    const res = await fetch(jsonUrl);
    const data = await res.json();

    console.log("JSON:", data);

    if (!data.model) {
      loading.innerText = "Model missing!";
      return;
    }

    // 🔥 Load model
    const modelEl = document.getElementById("model");

    modelEl.setAttribute("gltf-model", data.model);

    // Model loaded event
    modelEl.addEventListener("model-loaded", () => {

      loading.style.display = "none";

      // 🔊 Voice after 3 sec
      setTimeout(() => {
        const speech = new SpeechSynthesisUtterance(data.details || "Model loaded");
        speech.lang = "en-US";
        speechSynthesis.speak(speech);
      }, 3000);

    });

  } catch (err) {
    console.error(err);
    loading.innerText = "Error loading data!";
  }
}

initVR();

</script>

</body>
</html>
