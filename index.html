<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Model Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
        // URL logic
        AFRAME.registerComponent('dynamic-model', {
            init: function () {
                const urlParams = new URLSearchParams(window.location.search);
                const modelUrl = urlParams.get('model');
                const name = urlParams.get('name');
                const details = urlParams.get('details');

                // Set Name Text
                if (name) {
                    document.getElementById('titleText').setAttribute('value', name);
                }

                // Load 3D Model
                if (modelUrl) {
                    this.el.setAttribute('gltf-model', modelUrl);
                } else {
                    document.getElementById('titleText').setAttribute('value', 'Error: No Model URL Found');
                }
            }
        });
    </script>
</head>
<body>
    <a-scene background="color: #202020">
        <a-assets>
            </a-assets>

        <a-camera position="0 1.6 0">
            <a-cursor color="yellow"></a-cursor>
        </a-camera>

        <a-text 
            id="titleText" 
            value="Loading Model..." 
            position="0 2.5 -3" 
            align="center" 
            color="#FFFFFF" 
            scale="1.5 1.5 1.5">
        </a-text>

        <a-entity 
            dynamic-model 
            position="0 1 -3" 
            scale="1 1 1"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-entity>

        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="-1 2 1"></a-light>
    </a-scene>
</body>
</html>
