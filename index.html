<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium AI VR Museum</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Loading Screen Style */
        #overlay {
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; font-family: sans-serif;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00d1ff;
            border: none; border-radius: 5px; color: black; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Artifact VR Experience</h1>
        <p>Ready to explore the history?</p>
        <button onclick="startExperience()">ENTER VR MUSEUM</button>
    </div>

    <script>
        let sceneData = null;

        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            // Voice active karne ke liye dummy speech
            const synth = window.speechSynthesis;
            const ut = new SpeechSynthesisUtterance("");
            synth.speak(ut);
            
            // Enter VR automatically
            document.querySelector('a-scene').enterVR();
        }

        AFRAME.registerComponent('scene-manager', {
            init: function () {
                const params = new URLSearchParams(window.location.search);
                const jsonUrl = params.get('data');
                const titleEl = document.querySelector('#ui-title');
                const descEl = document.querySelector('#ui-desc');
                const modelEl = document.querySelector('#target-model');

                if (jsonUrl) {
                    fetch(decodeURIComponent(jsonUrl))
                        .then(res => res.json())
                        .then(data => {
                            sceneData = data;
                            titleEl.setAttribute('value', data.name);
                            descEl.setAttribute('value', data.details);
                            
                            // Fix GitHub URL if needed
                            let rawModelUrl = data.model.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                            modelEl.setAttribute('gltf-model', rawModelUrl);

                            modelEl.addEventListener('model-loaded', () => {
                                setTimeout(() => {
                                    if(sceneData) speakText(`${sceneData.name}. ${sceneData.details}`);
                                }, 3000);
                            });
                        })
                        .catch(err => {
                            titleEl.setAttribute('value', "JSON Error");
                            console.error(err);
                        });
                }
            }
        });

        function speakText(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        AFRAME.registerComponent('auto-fit', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2.0 / (maxDim || 1);
                    this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);
                    const center = box.getCenter(new THREE.Vector3());
                    mesh.position.set(-center.x, -center.y, -center.z);
                });
            }
        });
    </script>

    <a-scene scene-manager vr-mode-ui="enterAREnabled: false" renderer="colorManagement: true">
        <a-sky color="#050505"></a-sky>
        <a-grid position="0 0 0" material="opacity: 0.2; color: #00d1ff"></a-grid>

        <a-entity position="0 1.6 0">
            <a-camera>
                <a-cursor fuse="true" fuse-timeout="1200" raycaster="objects: .clickable" color="#00d1ff"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity position="0 3.2 -4" geometry="primitive: plane; width: 5; height: 2" material="color: #111; opacity: 0.9">
            <a-text id="ui-title" value="Loading Artifact..." position="0 0.6 0.05" align="center" width="6" color="#00d1ff" font="exo2bold"></a-text>
            <a-text id="ui-desc" value="..." position="0 -0.2 0.05" align="center" width="3.8" wrap-count="50"></a-text>
        </a-entity>

        <a-entity id="model-parent" position="0 1.2 -3.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
            <a-entity id="target-model" auto-fit></a-entity>
        </a-entity>

        <a-entity position="-1.5 0.4 -2.5" geometry="primitive: box; width: 0.6; height: 0.3; depth: 0.1" material="color: #222" class="clickable"
                  onclick="let s = document.querySelector('#model-parent').getAttribute('scale'); document.querySelector('#model-parent').setAttribute('scale', {x: s.x*1.2, y: s.y*1.2, z: s.z*1.2})">
            <a-text value="Size +" align="center" position="0 0 0.06" width="3"></a-text>
        </a-entity>

        <a-entity position="1.5 0.4 -2.5" geometry="primitive: box; width: 0.6; height: 0.3; depth: 0.1" material="color: #222" class="clickable"
                  onclick="let s = document.querySelector('#model-parent').getAttribute('scale'); document.querySelector('#model-parent').setAttribute('scale', {x: s.x*0.8, y: s.y*0.8, z: s.z*0.8})">
            <a-text value="Size -" align="center" position="0 0 0.06" width="3"></a-text>
        </a-entity>

    </a-scene>
</body>
</html>
