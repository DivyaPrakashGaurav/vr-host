<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Model Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
        AFRAME.registerComponent('vr-controller', {
            init: function () {
                const urlParams = new URLSearchParams(window.location.search);
                const modelUrl = urlParams.get('model');
                const name = urlParams.get('name') || '3D Model';
                const details = urlParams.get('details') || 'No details available.';

                // 1. Set Title & Details Text in VR Scene
                document.getElementById('titleText').setAttribute('value', name);
                document.getElementById('detailsText').setAttribute('value', details);

                // 2. Load 3D Model
                if (modelUrl) {
                    this.el.setAttribute('gltf-model', modelUrl);
                } else {
                    document.getElementById('titleText').setAttribute('value', 'Error: No Model URL');
                }

                // 3. Text-To-Speech (Voice) Logic
                let hasSpoken = false;

                const speakDetails = () => {
                    if (hasSpoken) return; 
                    hasSpoken = true;

                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const textToSpeak = name + ". " + details;
                        const utterance = new SpeechSynthesisUtterance(textToSpeak);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9; 
                        utterance.pitch = 1.0;
                        window.speechSynthesis.speak(utterance);
                    }
                };

                // Exactly 3 seconds
                setTimeout(() => {
                    speakDetails();
                }, 3000);

                // Fallback:
                window.addEventListener('click', speakDetails);
                window.addEventListener('touchstart', speakDetails);
            }
        });
    </script>
</head>
<body>
    <a-scene background="color: #111111">
        
        <a-camera position="0 1.6 0">
            <a-cursor color="#4CC3D9" opacity="0.6" scale="0.8 0.8 0.8"></a-cursor>
        </a-camera>

        <a-entity position="0 2.8 -3">
            <a-text 
                id="titleText" 
                value="Loading Title..." 
                align="center" 
                color="#FFD700" 
                scale="1.3 1.3 1.3"
                position="0 0.4 0">
            </a-text>

            <a-text 
                id="detailsText" 
                value="Loading details..." 
                align="center" 
                color="#FFFFFF" 
                width="4" 
                wrap-count="35" 
                position="0 -0.2 0">
            </a-text>
        </a-entity>

        <a-entity 
            id="modelEntity"
            vr-controller 
            position="0 0.8 -3" 
            scale="0.3 0.3 0.3">
        </a-entity>

        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1" position="-1 2 1"></a-light>
    </a-scene>
</body>
</html>
