<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Artifact Viewer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        // 1. Component to Handle Scaling
        AFRAME.registerComponent('model-scaler', {
            init: function () {
                this.scaleFactor = 1.0;
                this.el.addEventListener('scale-up', () => {
                    this.scaleFactor *= 1.2;
                    this.el.setAttribute('scale', `${this.scaleFactor} ${this.scaleFactor} ${this.scaleFactor}`);
                });
                this.el.addEventListener('scale-down', () => {
                    this.scaleFactor *= 0.8;
                    this.el.setAttribute('scale', `${this.scaleFactor} ${this.scaleFactor} ${this.scaleFactor}`);
                });
            }
        });

        // 2. Component for Auto-Fit and Centering
        AFRAME.registerComponent('auto-fit', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;
                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const targetSize = 2.0; 
                    const scaleFactor = targetSize / (maxDim || 1); 
                    this.el.setAttribute('scale', `${scaleFactor} ${scaleFactor} ${scaleFactor}`);
                    // Re-centering the inner mesh
                    const center = box.getCenter(new THREE.Vector3());
                    mesh.position.set(-center.x, -center.y, -center.z);
                });
            }
        });

        // 3. Main Scene Manager
        AFRAME.registerComponent('scene-manager', {
            init: function () {
                const urlParams = new URLSearchParams(window.location.search);
                const jsonUrl = urlParams.get('data');

                const titleEl = document.getElementById('ui-title');
                const descEl = document.getElementById('ui-desc');
                const modelEl = document.getElementById('target-model');

                if (jsonUrl) {
                    fetch(decodeURIComponent(jsonUrl))
                        .then(res => res.json())
                        .then(data => {
                            titleEl.setAttribute('value', data.name);
                            descEl.setAttribute('value', data.details);
                            
                            if (data.model) {
                                modelEl.setAttribute('gltf-model', data.model);
                                modelEl.addEventListener('model-loaded', () => {
                                    setTimeout(() => {
                                        this.speakText(`${data.name}. ${data.details}`);
                                    }, 3000);
                                });
                            }
                        })
                        .catch(err => {
                            titleEl.setAttribute('value', "Fetch Error");
                            descEl.setAttribute('value', "Could not load JSON from GitHub.");
                        });
                }
            },
            speakText: function (text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = 'en-US';
                    msg.rate = 0.85;
                    window.speechSynthesis.speak(msg);
                }
            }
        });
    </script>
</head>
<body>

    <a-scene scene-manager 
             vr-mode-ui="enterAREnabled: false; enterVREnabled: true" 
             renderer="colorManagement: true">
        
        <a-assets>
            <img id="ground-tex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        </a-assets>

        <a-sky color="#050505"></a-sky>
        <a-plane src="#ground-tex" rotation="-90 0 0" width="50" height="50" repeat="10 10"></a-plane>

        <a-entity position="0 1.6 0">
            <a-camera look-controls>
                <a-cursor fuse="true" fuse-timeout="1000" color="#00d1ff" scale="0.5 0.5 0.5"></a-cursor>
            </a-camera>
        </a-entity>

        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" intensity="1" position="1 3 1"></a-light>
        <a-light type="point" intensity="0.8" position="0 2 -2" color="#fff"></a-light>

        <a-entity position="0 3 -4" geometry="primitive: plane; width: 4.5; height: 1.8" material="color: #111; opacity: 0.9; transparent: true">
            <a-text id="ui-title" value="Loading Artifact..." position="0 0.5 0.02" align="center" width="5" color="#00d1ff"></a-text>
            <a-text id="ui-desc" value="Connecting to server..." position="0 -0.2 0.02" align="center" width="3.5" wrap-count="45" color="#fff"></a-text>
        </a-entity>

        <a-entity id="model-parent" position="0 1.2 -3.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear" model-scaler>
            <a-entity id="target-model" auto-fit></a-entity>
        </a-entity>

        <a-entity position="-1.5 0.5 -3">
            <a-box color="#222" width="0.6" height="0.4" depth="0.1" 
                   onclick="document.getElementById('model-parent').emit('scale-up')"
                   class="clickable">
                <a-text value="Size +" align="center" position="0 0 0.06" width="3"></a-text>
            </a-box>
        </a-entity>

        <a-entity position="1.5 0.5 -3">
            <a-box color="#222" width="0.6" height="0.4" depth="0.1" 
                   onclick="document.getElementById('model-parent').emit('scale-down')"
                   class="clickable">
                <a-text value="Size -" align="center" position="0 0 0.06" width="3"></a-text>
            </a-box>
        </a-entity>

    </a-scene>
</body>
</html>
