<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Viewer</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #loading {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      color:white;
      font-size:18px;
    }
  </style>
</head>

<body>
  <div id="loading">Loading VR...</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/webxr/VRButton.js"></script>

  <script src="app.js"></script>
</body>
</html>
