<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed WebXR VR Viewer</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        // ==========================================
        // 1. COMPONENT TO DIAGNOSE MODEL ERRORS
        // ==========================================
        AFRAME.registerComponent('model-troubleshooter', {
            init: function () {
                // Find and store references to UI text elements for updating status
                this.statusTextEl = document.getElementById('debug-status');
                this.detailsTextEl = document.getElementById('debug-details');

                // Listener for successful model load
                this.el.addEventListener('model-loaded', () => {
                    console.log("Model successfully loaded!");
                    if (this.statusTextEl) this.statusTextEl.setAttribute('value', 'Model: Loaded Successfully');
                    if (this.detailsTextEl) this.detailsTextEl.setAttribute('value', ''); // Clear previous error details
                });

                // Listener for model load errors
                this.el.addEventListener('model-error', (event) => {
                    console.error("Model failed to load. Check console for details.", event);
                    if (this.statusTextEl) this.statusTextEl.setAttribute('value', 'Model: Error Loading');
                    // Get a more descriptive error message to display in the VR UI
                    const errorMessage = `Details: ${event.detail.error.message || 'Check browser console.'}`;
                    if (this.detailsTextEl) this.detailsTextEl.setAttribute('value', errorMessage);
                });
            }
        });
    </script>
</head>
<body>

    <a-scene renderer="colorManagement: true; physicallyCorrectLights: true; gammaOutput: true;" 
             vr-mode-ui="enterAREnabled: false; enterVREnabled: true;">
        
        <a-sky color="#87CEEB"></a-sky>
        
        <a-plane color="#5b6166" 
                 rotation="-90 0 0" 
                 width="100" 
                 height="100" 
                 material="roughness: 0.8" 
                 static-body="shape: box">
        </a-plane>

        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" 
                 color="#ffffff" 
                 intensity="1.2" 
                 position="-1 2 1" 
                 target="#target-model">
        </a-light>

        <a-entity position="0 1.6 0">
            <a-camera look-controls></a-camera>
        </a-entity>

        <a-text value="Put on headset and use gaze-based selection" 
                align="center" 
                position="0 2.5 -3" 
                width="4" 
                color="#000000" 
                font="dejavu">
        </a-text>

        <a-entity position="0 2 -3" geometry="primitive: plane; width: 3; height: 1" material="color: #000; opacity: 0.8; transparent: true">
            <a-text id="debug-status" 
                    value="Model: Not Loaded" 
                    position="0 0.3 0.01" 
                    align="center" 
                    width="2.8" 
                    color="#ffffff" 
                    font="dejavu">
            </a-text>
            <a-text id="debug-details" 
                    value="" 
                    position="0 -0.2 0.01" 
                    align="center" 
                    width="2.5" 
                    wrap-count="40" 
                    color="#FF0000">
            </a-text>
        </a-entity>

        <a-entity id="target-model" 
                  gltf-model="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb" 
                  position="0 1 -4" 
                  scale="2 2 2" 
                  model-troubleshooter>
        </a-entity>
        
        </a-scene>

</body>
</html>
