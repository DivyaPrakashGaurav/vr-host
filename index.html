<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VR Museum</title>

  <!-- A-Frame -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
  <!-- GLB / GLTF loader is bundled with A-Frame 1.5 -->

  <style>
    /* ── Start Overlay ─────────────────────────────────────────── */
    #start-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0d0d1a 0%, #000005 100%);
      font-family: 'Georgia', serif;
      color: #e8dfc8;
      text-align: center;
      padding: 2rem;
      transition: opacity .6s ease;
    }
    #start-overlay h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: .4rem;
    }
    #start-overlay p {
      font-size: clamp(.85rem, 2.5vw, 1.1rem);
      opacity: .7;
      margin-bottom: 2.4rem;
      max-width: 360px;
      line-height: 1.6;
    }
    #start-btn {
      padding: .85rem 2.4rem;
      border: 1.5px solid #c9a96e;
      background: transparent;
      color: #c9a96e;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background .3s, color .3s;
    }
    #start-btn:hover { background: #c9a96e22; }

    /* ── Loading spinner ───────────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 8888;
      display: none;
      align-items: center; justify-content: center;
      background: #000005;
      flex-direction: column;
      gap: 1.2rem;
      color: #c9a96e;
      font-family: 'Georgia', serif;
      font-size: .9rem;
      letter-spacing: .12em;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 2px solid #c9a96e33;
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ──────────────────────────────────────────── */
    #error-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
      padding: .7rem 1rem;
      background: #7a1a1a;
      color: #fdd;
      font-family: monospace;
      font-size: .78rem;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── START OVERLAY ──────────────────────────────────────────── -->
<div id="start-overlay">
  <h1>Virtual Museum</h1>
  <p>Step inside an immersive exhibition. Tap <em>Enter</em> to enable audio narration and begin your experience.</p>
  <button id="start-btn">ENTER EXHIBITION</button>
</div>

<!-- ── LOADING SCREEN ─────────────────────────────────────────── -->
<div id="loading-screen">
  <div class="spinner"></div>
  <span id="loading-text">LOADING ARTIFACT…</span>
</div>

<!-- ── ERROR BANNER ───────────────────────────────────────────── -->
<div id="error-banner" id="error-banner"></div>

<!-- ═══════════════════════════════════════════════════════════════
     A-FRAME SCENE
═══════════════════════════════════════════════════════════════ -->
<a-scene
  id="main-scene"
  vr-mode-ui="enterAREnabled: false"
  renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true; exposure: 1"
  loading-screen="enabled: false"
  background="color: #06060f"
>

  <!-- ── Assets ───────────────────────────────────────────────── -->
  <a-assets id="scene-assets" timeout="30000"></a-assets>

  <!-- ── Camera + Gaze Cursor ──────────────────────────────────── -->
  <a-entity id="rig" position="0 1.6 3">
    <a-camera
      id="main-camera"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: false"
      fov="80"
    >
      <!-- Fuse cursor for gaze interaction -->
      <a-entity
        cursor="fuse: true; fuseTimeout: 1500"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018"
        material="color: #c9a96e; shader: flat; opacity: 0.9"
        animation__click="property: scale; startEvents: click; from: 1.3 1.3 1; to: 1 1 1; dur: 200"
        animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 1.3 1.3 1; dur: 1500"
        raycaster="objects: .interactable; far: 10"
        id="gaze-cursor"
      ></a-entity>
    </a-camera>
  </a-entity>

  <!-- ── Lighting ──────────────────────────────────────────────── -->
  <a-light type="ambient" color="#1a1a2e" intensity="0.6"></a-light>
  <a-light type="directional" color="#f5e6c8" intensity="1.2"
           position="3 6 2" cast-shadow="true"
           shadow-camera-near="0.5" shadow-camera-far="20"
           shadow-camera-left="-6" shadow-camera-right="6"
           shadow-camera-top="6" shadow-camera-bottom="-6"
           shadow-mapsize-width="1024" shadow-mapsize-height="1024">
  </a-light>
  <!-- Subtle rim lights for drama -->
  <a-light type="point" color="#4a3080" intensity="0.8" position="-4 3 -3" distance="12"></a-light>
  <a-light type="point" color="#204060" intensity="0.6" position="4 2 -4" distance="10"></a-light>

  <!-- ── Floor ─────────────────────────────────────────────────── -->
  <a-entity id="museum-floor"
    geometry="primitive: plane; width: 20; height: 20"
    rotation="-90 0 0"
    position="0 0 0"
    material="color: #0a0a14; roughness: 0.9; metalness: 0.1"
    shadow="receive: true">
  </a-entity>

  <!-- Grid overlay on floor -->
  <a-entity id="grid-floor"
    geometry="primitive: plane; width: 20; height: 20"
    rotation="-90 0 0"
    position="0 0.001 0"
    material="src: #grid-tex; color: #c9a96e; opacity: 0.08; transparent: true; shader: flat">
  </a-entity>

  <!-- Pedestal -->
  <a-cylinder
    id="pedestal"
    position="0 -0.5 0"
    radius="0.6" height="1"
    color="#1a1520"
    roughness="0.6" metalness="0.3"
    shadow="cast: true; receive: true">
  </a-cylinder>
  <!-- Pedestal ring accent -->
  <a-torus
    position="0 0.01 0"
    radius="0.62" radius-tubular="0.015"
    color="#c9a96e"
    roughness="0.4" metalness="0.8">
  </a-torus>

  <!-- ── Artifact container (auto-scaled GLB goes here) ──────── -->
  <a-entity id="artifact-container" position="0 1.0 0">
    <a-entity id="artifact-model" auto-scale-model></a-entity>
  </a-entity>

  <!-- ── Glassmorphism Info Panel ──────────────────────────────── -->
  <a-entity id="info-panel" position="-1.6 1.4 -0.5" rotation="0 30 0">
    <!-- Glass backing -->
    <a-plane
      width="1.4" height="0.9"
      material="color: #0d0d1a; opacity: 0.72; transparent: true; side: double; shader: flat"
      position="0 0 -0.002">
    </a-plane>
    <!-- Border frame -->
    <a-plane
      width="1.44" height="0.94"
      material="color: #c9a96e; opacity: 0.35; transparent: true; side: double; shader: flat"
      position="0 0 -0.003">
    </a-plane>
    <!-- Top gold rule -->
    <a-plane width="1.2" height="0.003"
      material="color: #c9a96e; shader: flat; opacity: 0.9; transparent: false"
      position="0 0.38 0.001">
    </a-plane>

    <!-- Artifact Name -->
    <a-text id="panel-name"
      value="Loading…"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      color="#c9a96e"
      width="1.2"
      position="-0.58 0.28 0.005"
      baseline="top"
      wrap-count="24"
      line-height="50"
      shader="msdf">
    </a-text>

    <!-- Artifact Details -->
    <a-text id="panel-details"
      value=""
      font="https://cdn.aframe.io/fonts/Exo2Light.fnt"
      color="#d8cebb"
      width="1.15"
      position="-0.54 0.14 0.005"
      baseline="top"
      wrap-count="38"
      line-height="42"
      shader="msdf">
    </a-text>

    <!-- Bottom label -->
    <a-text
      value="◈  VIRTUAL MUSEUM"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      color="#c9a96e"
      width="0.6"
      position="0 -0.4 0.005"
      align="center"
      shader="msdf">
    </a-text>
  </a-entity>

  <!-- ── 3D Control Buttons ─────────────────────────────────────── -->
  <!-- Scale Up -->
  <a-entity id="btn-up" class="interactable" position="1.4 0.6 0.5" rotation="0 -35 0"
            vr-button="label: ▲ SCALE UP; action: scaleUp"
            animation__hover="property: scale; startEvents: mouseenter; to: 1.1 1.1 1.1; dur: 200"
            animation__leave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 200">
  </a-entity>
  <!-- Scale Down -->
  <a-entity id="btn-down" class="interactable" position="1.4 0.2 0.5" rotation="0 -35 0"
            vr-button="label: ▼ SCALE DOWN; action: scaleDown"
            animation__hover="property: scale; startEvents: mouseenter; to: 1.1 1.1 1.1; dur: 200"
            animation__leave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 200">
  </a-entity>
  <!-- Rotate Toggle -->
  <a-entity id="btn-rotate" class="interactable" position="1.4 -0.2 0.5" rotation="0 -35 0"
            vr-button="label: ↻ ROTATE; action: rotateToggle"
            animation__hover="property: scale; startEvents: mouseenter; to: 1.1 1.1 1.1; dur: 200"
            animation__leave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 200">
  </a-entity>

  <!-- ── Environment Details ────────────────────────────────────── -->
  <!-- Back wall -->
  <a-plane width="16" height="6" position="0 3 -6" 
           material="color: #09090f; roughness: 1; opacity: 1">
  </a-plane>
  <!-- Side walls -->
  <a-plane width="12" height="6" position="-6 3 -1" rotation="0 90 0"
           material="color: #09090f; roughness: 1">
  </a-plane>
  <a-plane width="12" height="6" position="6 3 -1" rotation="0 -90 0"
           material="color: #09090f; roughness: 1">
  </a-plane>

  <!-- Ceiling accent strip light -->
  <a-plane width="2" height="0.06" position="0 4.99 -1" rotation="-90 0 0"
           material="color: #f5e6c8; shader: flat; opacity: 0.6; transparent: true">
  </a-plane>
  <a-light type="point" color="#f5e6c8" intensity="0.4" position="0 4.8 -1" distance="5"></a-light>

  <!-- Decorative gold pillars -->
  <a-cylinder position="-2.8 2 -5.5" radius="0.08" height="5"
              color="#1a1520" roughness="0.6" metalness="0.5"></a-cylinder>
  <a-torus position="-2.8 4.4 -5.5" radius="0.12" radius-tubular="0.02"
           color="#c9a96e" metalness="0.9" roughness="0.2"></a-torus>
  <a-cylinder position="2.8 2 -5.5" radius="0.08" height="5"
              color="#1a1520" roughness="0.6" metalness="0.5"></a-cylinder>
  <a-torus position="2.8 4.4 -5.5" radius="0.12" radius-tubular="0.02"
           color="#c9a96e" metalness="0.9" roughness="0.2"></a-torus>

</a-scene>

<!-- ═══════════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════════ -->
<script>
/* ----------------------------------------------------------------
   UTILITIES
---------------------------------------------------------------- */
function toRawURL(url) {
  // Convert github.com blob URLs → raw.githubusercontent.com
  return url
    .replace('https://github.com/', 'https://raw.githubusercontent.com/')
    .replace('/blob/', '/');
}

function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = '⚠ ' + msg;
  b.style.display = 'block';
  console.error('[VR Museum]', msg);
}

function setLoading(active, text) {
  const s = document.getElementById('loading-screen');
  s.style.display = active ? 'flex' : 'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

/* ----------------------------------------------------------------
   A-FRAME COMPONENT: auto-scale-model
   Uses THREE.Box3 to fit model into a 2m cube, centred at origin
---------------------------------------------------------------- */
AFRAME.registerComponent('auto-scale-model', {
  schema: { targetSize: { type: 'number', default: 2.0 } },

  init() {
    this.el.addEventListener('model-loaded', () => this.scaleModel());
  },

  scaleModel() {
    const mesh = this.el.getObject3D('mesh');
    if (!mesh) return;

    // Force matrix update on all children
    mesh.updateMatrixWorld(true);

    const box  = new THREE.Box3().setFromObject(mesh);
    const size = new THREE.Vector3();
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim === 0) return;

    const scale = this.data.targetSize / maxDim;
    this.el.object3D.scale.setScalar(scale);

    // Recompute after scale to centre the pivot
    mesh.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(mesh);
    const centre = new THREE.Vector3();
    box2.getCenter(centre);

    // Shift the mesh so its centre is at local origin
    this.el.object3D.position.set(
      -centre.x,
      -centre.y,
      -centre.z
    );

    // Signal that scaling is done
    this.el.emit('model-scaled', { scale });
  }
});

/* ----------------------------------------------------------------
   A-FRAME COMPONENT: vr-button
   Renders a styled 3-D button with gaze/click interaction
---------------------------------------------------------------- */
AFRAME.registerComponent('vr-button', {
  schema: {
    label:  { type: 'string', default: 'BUTTON' },
    action: { type: 'string', default: '' }
  },

  init() {
    const el = this.el;
    const label = this.data.label;

    // Background plane
    const bg = document.createElement('a-plane');
    bg.setAttribute('width',  0.5);
    bg.setAttribute('height', 0.14);
    bg.setAttribute('material', 'color: #0d0d1a; opacity: 0.85; transparent: true; shader: flat; side: double');
    el.appendChild(bg);

    // Border
    const border = document.createElement('a-plane');
    border.setAttribute('width',  0.52);
    border.setAttribute('height', 0.16);
    border.setAttribute('material', 'color: #c9a96e; opacity: 0.5; transparent: true; shader: flat; side: double');
    border.setAttribute('position', '0 0 -0.002');
    el.appendChild(border);

    // Label text
    const text = document.createElement('a-text');
    text.setAttribute('value', label);
    text.setAttribute('color', '#c9a96e');
    text.setAttribute('width', 0.44);
    text.setAttribute('align', 'center');
    text.setAttribute('position', '0 0 0.006');
    text.setAttribute('shader', 'msdf');
    el.appendChild(text);

    // Reference for hover/click visual feedback
    this._bg     = bg;
    this._border = border;

    el.addEventListener('mouseenter', () => {
      bg.setAttribute('material', 'color: #c9a96e22; opacity: 0.95; transparent: true; shader: flat');
      border.setAttribute('material', 'color: #c9a96e; opacity: 0.9; transparent: true; shader: flat');
    });
    el.addEventListener('mouseleave', () => {
      bg.setAttribute('material', 'color: #0d0d1a; opacity: 0.85; transparent: true; shader: flat');
      border.setAttribute('material', 'color: #c9a96e; opacity: 0.5; transparent: true; shader: flat');
    });
    el.addEventListener('click', () => this.handleAction());
  },

  handleAction() {
    const action = this.data.action;
    const container = document.getElementById('artifact-container');
    if (!container) return;

    const current = container.object3D.scale.x;

    if (action === 'scaleUp') {
      const ns = Math.min(current * 1.2, 8);
      container.object3D.scale.setScalar(ns);
    } else if (action === 'scaleDown') {
      const ns = Math.max(current * 0.833, 0.1);
      container.object3D.scale.setScalar(ns);
    } else if (action === 'rotateToggle') {
      const model = document.getElementById('artifact-model');
      const hasAnim = model.getAttribute('animation__rotate');
      if (hasAnim) {
        model.removeAttribute('animation__rotate');
      } else {
        model.setAttribute('animation__rotate', {
          property: 'rotation',
          to: '0 360 0',
          loop: true,
          dur: 8000,
          easing: 'linear'
        });
      }
    }
  }
});

/* ----------------------------------------------------------------
   MAIN APP LOGIC
---------------------------------------------------------------- */
(function() {
  let artifactData  = null;
  let ttsEnabled    = false;
  let modelLoaded   = false;

  /* -- Parse ?data= URL parameter -------------------------------- */
  function getDataURL() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (!raw) return null;
    return toRawURL(decodeURIComponent(raw));
  }

  /* -- Fetch JSON artifact data ----------------------------------- */
  async function fetchArtifactData(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching JSON`);
    return res.json();
  }

  /* -- Update info panel text ------------------------------------ */
  function updatePanel(name, details) {
    document.getElementById('panel-name').setAttribute('value', name || 'Unknown Artifact');
    document.getElementById('panel-details').setAttribute('value', details || '');
  }

  /* -- Web Speech API narration ---------------------------------- */
  function narrate(name, details) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const text = `${name}. ${details}`;
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate  = 0.88;
    utter.pitch = 0.95;
    utter.volume = 1;
    // Pick an English voice if available
    const voices = window.speechSynthesis.getVoices();
    const eng = voices.find(v => v.lang.startsWith('en'));
    if (eng) utter.voice = eng;
    window.speechSynthesis.speak(utter);
  }

  /* -- Load GLB into scene --------------------------------------- */
  function loadModel(glbURL) {
    const modelEl = document.getElementById('artifact-model');

    // Clear previous model
    modelEl.removeAttribute('gltf-model');
    modelEl.removeAttribute('animation__rotate');
    modelEl.object3D.scale.setScalar(1);
    modelEl.object3D.position.set(0, 0, 0);

    setLoading(true, 'LOADING ARTIFACT…');

    modelEl.setAttribute('shadow', 'cast: true; receive: false');
    modelEl.setAttribute('gltf-model', glbURL);

    modelEl.addEventListener('model-loaded', function onLoad() {
      modelEl.removeEventListener('model-loaded', onLoad);
      setLoading(false);
      modelLoaded = true;

      if (artifactData && ttsEnabled) {
        setTimeout(() => narrate(artifactData.name, artifactData.details), 3000);
      }
    }, { once: true });

    modelEl.addEventListener('model-error', function onErr(e) {
      modelEl.removeEventListener('model-error', onErr);
      setLoading(false);
      showError('Failed to load 3D model. Check the GLB URL.');
    }, { once: true });
  }

  /* -- Start button handler -------------------------------------- */
  document.getElementById('start-btn').addEventListener('click', async () => {
    ttsEnabled = true;

    // Fade + hide overlay
    const overlay = document.getElementById('start-overlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 650);

    const dataURL = getDataURL();
    if (!dataURL) {
      // Demo mode: load a free GLB sample
      artifactData = {
        name:    'Ancient Greek Amphora',
        details: 'A terracotta storage vessel from the 5th century BC. Used to transport olive oil, wine, and grain across the Mediterranean world.'
      };
      updatePanel(artifactData.name, artifactData.details);
      loadModel('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Duck/glTF-Binary/Duck.glb');
      return;
    }

    setLoading(true, 'FETCHING DATA…');
    try {
      const json = await fetchArtifactData(dataURL);
      artifactData = json;

      const name    = json.name    || 'Unknown Artifact';
      const details = json.details || '';
      let   glbURL  = json.model   || '';

      if (!glbURL) { showError('JSON has no "model" GLB URL.'); setLoading(false); return; }
      glbURL = toRawURL(glbURL);

      updatePanel(name, details);
      loadModel(glbURL);

    } catch (err) {
      setLoading(false);
      showError('Could not fetch artifact data: ' + err.message);
    }
  });

  /* -- Pre-load voices for TTS (Chrome async requirement) -------- */
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    window.speechSynthesis.getVoices();
  }

})();
</script>

</body>
</html>
